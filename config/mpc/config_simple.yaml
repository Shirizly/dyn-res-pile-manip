# config/mpc/config_simple.yaml
#
# Configuration for simple_mpc.run_simple_mpc().
#
# When USE_SIMPLE_MPC = True in a visualize_*.py script, this file is loaded
# IN PLACE OF config/mpc/config.yaml.  It contains every dataset field that
# FlexEnv and EulerianModelWrapper need, plus a simplified mpc section.
#
# Key differences from config.yaml:
#   - mpc.n_update_iter: 100 (down from 200) — enough for random-init candidates
#   - mpc.gd.lr: 0.01 (up from 0.001) — random starts are spread out, bigger
#     steps needed; tune this if curves in optimizer_convergence.png are noisy
#   - mpc.n_sample: 50 — one Adam run per candidate; diversity comes from the
#     random initialisation, not from the sample count
#   - No mpc.model_folder / iter_num / res_sel — not used by simple_mpc
#
# Edit only the mpc section for tuning; the dataset section should match
# config/mpc/config.yaml exactly.

dataset:
  init_pos: 'rand_spread'
  global_scale: 24          # 12 (ball, coffee); 24 (carrots, capsule)
  obj: "carrots"            # "coffee"; "ball"; "capsule"; "carrots"
  particle_r: 0.125
  cam_idx: 0
  num_worker: 4
  wkspc_w: 5.0              # 2.5 (coffee, ball); 5.0 (carrots, capsule)
  headless: False
  cont_motion: False
  robot_type: 'franka'

mpc:
  # ── core MPC parameters ────────────────────────────────────────────────────
  n_mpc: 10           # number of real-world steps to execute
  n_look_ahead: 1    # planning horizon (steps rolled out in grid space)
  n_sample: 512       # candidates per optimizer call (each randomly initialised)
  n_update_iter: 100  # Adam iterations per MPC step

  # ── debug visualization ────────────────────────────────────────────────────
  # Produces two kinds of outputs per MPC step (when enabled: True):
  #
  #   step_NNN/iter_MMMM_topK.png
  #     Saved every `save_every_n_iters` Adam iterations (and at iter 0 and
  #     the last iter).  Shows the top-K candidates ranked by reward:
  #       col 0: input occupancy (same for all)
  #       col 1: predicted occupancy after the push action
  #       col 2: pred * goal_score  ← "reward density" — WHERE the reward
  #              comes from geometrically; compare with the score map to check
  #              if the optimizer is actually moving material toward the goal.
  #
  #   step_NNN/winner.png
  #     Saved once per MPC step after the environment executes the action.
  #     2 rows x 3 cols:
  #       row 0: input occ | predicted occ | goal score map
  #       row 1: input*score | pred*score | occ change (green=in, red=out)
  #     Titles show pred_gain vs act_gain.  A large gap = push model is
  #     over-estimating how much material moves.
  debug:
    enabled: True
    output_dir: 'outputs/simple_mpc_debug'
    top_k: 5                  # candidates shown per snapshot
    save_every_n_iters: 25    # snapshot frequency (also always saves iter 0 and last)
    benchmark_throughput: True  # set True once to print candidates/sec table at startup

  # ── reward shaping ───────────────────────────────────────────────────
  # empty_penalty > 0: non-goal voxels carry negative score proportional to
  # their distance from the goal (normalized to [-empty_penalty, 0]).
  # This penalizes material that stays in / moves into the wrong region,
  # preventing the optimizer from choosing near-zero "safe" actions.
  # 0.0 = old behaviour (all scores ≥ 0, no penalty for empty-space material).
  reward:
    empty_penalty: 1.0

  gd:
    lr: 0.05          # Adam learning rate — raise if Δr curves are flat;
                      # lower if they oscillate (reward drops after peaking)
    beta_filter: 0.7  # not used by simple_mpc; kept for structural compatibility

  # ── task ──────────────────────────────────────────────────────────────────
  task:
    type: 'target_shape'    # 'target_control' | 'target_shape'
    goal_row: 360           # used when type = 'target_control'
    goal_col: 360
    goal_r: 75
    target_char: 'T'        # used when type = 'target_shape'

  # ── output ────────────────────────────────────────────────────────────────
  output_dir: 'outputs/simple_mpc'
  video_fps: 0.5

  # ── visualize_prediction_eulerian.py overrides (optional) ─────────────────
  # prediction_viz:
  #   n_mpc: 5          # run fewer steps for quick debugging
  #   n_update_iter: 50

  # ── kept for structural compatibility with visualize_*.py ─────────────────
  mpc_type: 'GD'
  gd_loop: 1
  time_lim: .inf      # no per-step wall-clock budget in simple MPC
  sigma: 0.3
  mppi:
    beta_filter: 0.7
    reward_weight: 0.1

  # Fields read by visualize_mpc.py but unused by simple_mpc:
  model_folder: "2023-01-28-10-42-05-114323"
  iter_num: 1000
  res_sel:
    active: False
    model_folder: '2023-01-30-16-17-30-292500'
    iter_num: -1

  visualization:
    save_images: True
    save_video: True
    video_fps: 2
    video_speedup: 1.0
    plot_rewards: True
    output_dir: 'outputs/simple_mpc'

# Needed by EulerianModelWrapper.default_bounds() and occupancy grid setup.
# (Identical to the main config — do not change without changing config.yaml.)
train:
  n_history: 1
  n_rollout: 5
  particle:
    nf_effect: 64
    adj_thresh: 0.08
    add_delta: False
    resume:
      active: False
      epoch: 0
      iter: 0
      folder: 'None'
